<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Session Updated · My Third Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--sand-50);
  font-family: var(--f-body);
  -webkit-font-smoothing: antialiased;
}

.stage {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  background-color: var(--sand-50);
  background-image:
    linear-gradient(var(--hairline) 1px, transparent 1px),
    linear-gradient(90deg, var(--hairline) 1px, transparent 1px);
  background-size: 40px 40px;
  background-position: -1px -1px;
}

/* ── Animations ──────────────────────────────────────────────── */
@keyframes headerSlide {
  from { transform: translateY(-6px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
@keyframes bannerDrop {
  from { transform: translateY(-10px) scaleY(0.96); opacity: 0; transform-origin: top; }
  to   { transform: translateY(0) scaleY(1);        opacity: 1; transform-origin: top; }
}
@keyframes cardRise {
  from { transform: translateY(10px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
@keyframes resolveIn {
  from { opacity: 0; transform: scale(0.97); }
  to   { opacity: 1; transform: scale(1); }
}

.anim-header { animation: headerSlide 0.4s cubic-bezier(0.22,1,0.36,1) 0.1s both; }
.anim-banner { animation: bannerDrop  0.5s cubic-bezier(0.22,1,0.36,1) 0.28s both; }
.anim-card   { animation: cardRise   0.45s cubic-bezier(0.22,1,0.36,1) 0.5s both; }
.anim-resolve{ animation: resolveIn  0.35s cubic-bezier(0.22,1,0.36,1) both; }

.btn-tap:active { transform: scale(0.97); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">

// ── Colour constants (mirrors tokens.css + profile.jsx OT object) ─────────
const C = {
  espresso900: '#241810',
  espresso800: '#3E2C1C',
  walnut:      '#5E4228',
  clay600:     '#8A6640',
  clay500:     '#A8825A',
  sand50:      '#FBF7F0',
  sand100:     '#F5EDE0',
  sand200:     '#EADBC4',
  paper:       '#FFFDF8',
  sage:        '#7B8B6F',
  terra:       '#B86B4B',
  terra200:    '#ECCDBF',
  ochre:       '#C99A3F',
  hair:        'rgba(62,44,28,0.12)',
  hairStr:     'rgba(62,44,28,0.22)',
  // amber for banner bg — warm, distinct from sand tones
  amber:       '#FEF0CC',
};

// ── Status bar ────────────────────────────────────────────────────────────
function StatusBar() {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '14px 24px 0',
      fontFamily: "-apple-system, 'SF Pro Text', system-ui",
      fontSize: 15, fontWeight: 600,
      color: C.paper, // dark header → light text
    }}>
      <span style={{ letterSpacing: '-0.2px' }}>9:41</span>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        {/* Signal */}
        <svg width="18" height="12" viewBox="0 0 18 12" fill={C.paper}>
          <rect x="0"    y="7"   width="3" height="5"   rx="0.8"/>
          <rect x="4.5"  y="4.5" width="3" height="7.5" rx="0.8"/>
          <rect x="9"    y="2"   width="3" height="10"  rx="0.8"/>
          <rect x="13.5" y="0"   width="3" height="12"  rx="0.8"/>
        </svg>
        {/* WiFi */}
        <svg width="16" height="12" viewBox="0 0 16 12">
          <path fill={C.paper} d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm0-3.3c1.4 0 2.7.6 3.6 1.5l1.1-1.1A6.8 6.8 0 0 0 8 4.5a6.8 6.8 0 0 0-4.7 2.1l1.1 1.1C5.3 6.8 6.6 6.2 8 6.2zm0-3.3c2.3 0 4.3.9 5.8 2.4l1.1-1.2A8.5 8.5 0 0 0 8 1.2 8.5 8.5 0 0 0 1.1 4.1l1.1 1.2C3.7 3.8 5.7 2.9 8 2.9z"/>
        </svg>
        {/* Battery */}
        <svg width="26" height="13" viewBox="0 0 26 13">
          <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke={C.paper} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="18.5" height="9" rx="2" fill={C.paper}/>
          <path d="M24 4.5v4c.9-.3 1.5-1.1 1.5-2s-.6-1.7-1.5-2z" fill={C.paper} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ── Profile header — dark espresso, mirrors ProfileHero from profile.jsx ──
function ProfileHeader() {
  return (
    <div className="anim-header" style={{
      background: C.espresso900,
      padding: '14px 20px 22px',
      position: 'relative', overflow: 'hidden', flexShrink: 0,
    }}>
      {/* Subtle ochre glow — same as ProfileHero desktop */}
      <div style={{
        position: 'absolute', top: -44, right: -44,
        width: 170, height: 170, borderRadius: '50%',
        background: 'rgba(201,154,63,0.13)',
        pointerEvents: 'none',
      }} />

      <div style={{ position: 'relative', display: 'flex', alignItems: 'center', gap: 14 }}>
        {/* Avatar */}
        <div style={{
          width: 54, height: 54, borderRadius: '50%', flexShrink: 0,
          background: C.walnut, color: C.paper,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: '"Instrument Serif", Georgia, serif',
          fontStyle: 'italic', fontSize: 20,
          boxShadow: '0 2px 10px rgba(0,0,0,0.25)',
        }}>RS</div>

        {/* Name + meta */}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{
            fontFamily: '"JetBrains Mono", monospace', fontSize: 9,
            letterSpacing: '1.6px', textTransform: 'uppercase',
            color: 'rgba(255,253,248,0.48)', marginBottom: 4,
          }}>Member · since Apr 2025</div>
          <h1 style={{
            fontFamily: '"Instrument Serif", Georgia, serif',
            fontStyle: 'italic', fontWeight: 400,
            fontSize: 26, lineHeight: 1.08, letterSpacing: '-0.4px',
            color: C.paper,
          }}>Riya Sharma</h1>
          <div style={{
            fontFamily: '"Inter", system-ui', fontSize: 12.5,
            color: 'rgba(255,253,248,0.6)', marginTop: 3,
          }}>32 · Female · Muscle Gain</div>
        </div>

        {/* Coach chip */}
        <div style={{
          flexShrink: 0,
          padding: '8px 11px', borderRadius: 10,
          background: 'rgba(255,253,248,0.07)',
          border: '1px solid rgba(255,253,248,0.11)',
          display: 'flex', alignItems: 'center', gap: 8,
        }}>
          <div style={{
            width: 30, height: 30, borderRadius: '50%',
            background: C.sage, color: C.paper,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: '"Instrument Serif", Georgia, serif',
            fontStyle: 'italic', fontSize: 11,
          }}>LE</div>
          <div>
            <div style={{
              fontFamily: '"JetBrains Mono", monospace', fontSize: 8,
              letterSpacing: '1.3px', textTransform: 'uppercase',
              color: 'rgba(255,253,248,0.45)',
            }}>Coach</div>
            <div style={{
              fontFamily: '"Inter", system-ui', fontSize: 12.5,
              fontWeight: 600, color: C.paper, marginTop: 1,
            }}>Lee</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Action banner — three states: pending / accepted / declined ───────────
function ActionBanner({ state, onAccept, onDecline }) {

  // ── Resolved: accepted ──────────────────────────────────────────────────
  if (state === 'accepted') {
    return (
      <div className="anim-resolve" style={{
        background: '#EEF5EE',
        borderLeft: `4px solid ${C.sage}`,
        borderRadius: '0 var(--r-md) var(--r-md) 0',
        padding: '16px 18px',
      }}>
        <div style={eyebrowStyle(C.sage)}>
          <span style={dotStyle(C.sage)} />
          CONFIRMED
        </div>
        <div style={headlineStyle}>Coach Meera confirmed</div>
        <p style={bodyStyle}>
          Your session on Tuesday, 29 Apr at 7:00 AM is set with Coach Meera.
          You'll get a reminder the evening before.
        </p>
      </div>
    );
  }

  // ── Resolved: declined ──────────────────────────────────────────────────
  if (state === 'declined') {
    return (
      <div className="anim-resolve" style={{
        background: C.sand100,
        borderLeft: `4px solid ${C.clay500}`,
        borderRadius: '0 var(--r-md) var(--r-md) 0',
        padding: '16px 18px',
      }}>
        <div style={eyebrowStyle(C.clay500)}>
          <span style={dotStyle(C.clay500)} />
          SESSION CANCELLED
        </div>
        <div style={headlineStyle}>Credit added to your account</div>
        <p style={bodyStyle}>
          ₹ 2,400 session credit will appear in your account within 24 hours.
          Book a new slot whenever you're ready.
        </p>
      </div>
    );
  }

  // ── Pending (default) ───────────────────────────────────────────────────
  return (
    <div className="anim-banner" style={{
      background: C.amber,
      borderLeft: `4px solid ${C.terra}`,
      borderRadius: '0 var(--r-md) var(--r-md) 0',
      padding: '16px 18px',
    }}>
      {/* ● ACTION NEEDED */}
      <div style={eyebrowStyle(C.terra)}>
        <span style={dotStyle(C.terra)} />
        ACTION NEEDED
      </div>

      {/* Headline */}
      <div style={headlineStyle}>Your session has been updated</div>

      {/* Body */}
      <p style={{ ...bodyStyle, marginBottom: 18 }}>
        Coach Lee is unavailable on Tuesday, 29 Apr at 7:00 AM.
        Coach Meera is available at the same time. Confirm by 8 PM
        tonight or you'll be auto-confirmed with Coach Meera.
      </p>

      {/* CTAs — no dismiss, action required */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        <TerraBtn onClick={onAccept}>Accept Coach Meera</TerraBtn>
        <TerraGhostBtn onClick={onDecline}>Decline &amp; get session credit</TerraGhostBtn>
      </div>
    </div>
  );
}

// Shared text styles (match profile.jsx OT tokens)
const eyebrowStyle = (color) => ({
  display: 'flex', alignItems: 'center', gap: 7,
  fontFamily: '"JetBrains Mono", monospace',
  fontSize: 10, letterSpacing: '1.8px',
  textTransform: 'uppercase', color,
  marginBottom: 9,
});
const dotStyle = (color) => ({
  width: 6, height: 6, borderRadius: '50%',
  background: color, flexShrink: 0, display: 'inline-block',
});
const headlineStyle = {
  fontFamily: '"Inter", system-ui',
  fontSize: 16, fontWeight: 600,
  color: '#241810', lineHeight: 1.25, marginBottom: 9,
};
const bodyStyle = {
  fontFamily: '"Inter", system-ui',
  fontSize: 14, color: '#3E2C1C',
  lineHeight: 1.62, margin: 0,
};

// ── Terracotta pill buttons ───────────────────────────────────────────────
function TerraBtn({ children, onClick }) {
  const [hov, setHov] = React.useState(false);
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      className="btn-tap"
      style={{
        width: '100%', padding: '13px 18px',
        borderRadius: 'var(--r-pill)', border: 'none',
        background: hov ? '#9C5A3A' : C.terra,
        color: C.paper,
        fontFamily: '"Inter", system-ui', fontSize: 14, fontWeight: 600,
        cursor: 'pointer', transition: 'background .18s',
      }}>
      {children}
    </button>
  );
}

function TerraGhostBtn({ children, onClick }) {
  const [hov, setHov] = React.useState(false);
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      className="btn-tap"
      style={{
        width: '100%', padding: '12px 18px',
        borderRadius: 'var(--r-pill)',
        border: `1.5px solid rgba(184,107,75,0.45)`,
        background: hov ? 'rgba(184,107,75,0.09)' : 'transparent',
        color: C.terra,
        fontFamily: '"Inter", system-ui', fontSize: 14, fontWeight: 500,
        cursor: 'pointer', transition: 'background .18s',
      }}>
      {children}
    </button>
  );
}

// ── Your Next Session card ────────────────────────────────────────────────
function NextSessionCard({ coachName, coachInitials, coachBg, dimmed }) {
  const IconWrap = ({ children }) => (
    <div style={{ width: 20, flexShrink: 0, display: 'flex', justifyContent: 'center', paddingTop: 1 }}>
      {children}
    </div>
  );
  const MonoRow = ({ icon, primary, secondary }) => (
    <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
      <IconWrap>{icon}</IconWrap>
      <div>
        <div style={{
          fontFamily: '"JetBrains Mono", monospace',
          fontSize: 12.5, letterSpacing: '0.9px', fontWeight: 500,
          color: dimmed ? C.clay600 : C.espresso900,
        }}>{primary}</div>
        {secondary && (
          <div style={{
            fontFamily: '"JetBrains Mono", monospace',
            fontSize: 10.5, letterSpacing: '0.8px',
            color: C.clay600, marginTop: 2,
          }}>{secondary}</div>
        )}
      </div>
    </div>
  );

  return (
    <div className="anim-card" style={{
      background: C.paper,
      border: `1px solid ${C.hairStr}`,
      borderRadius: 16,
      boxShadow: '0 6px 20px -8px rgba(62,44,28,0.18)',
      overflow: 'hidden',
      opacity: dimmed ? 0.6 : 1,
      transition: 'opacity .3s',
    }}>
      {/* Header row */}
      <div style={{
        padding: '14px 18px',
        background: C.sand50,
        borderBottom: `1px solid ${C.hair}`,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <div>
          <div style={{
            fontFamily: '"JetBrains Mono", monospace', fontSize: 9,
            letterSpacing: '1.5px', textTransform: 'uppercase', color: C.clay600,
          }}>Your next session</div>
          <div style={{
            fontFamily: '"Instrument Serif", Georgia, serif',
            fontStyle: 'italic', fontSize: 20,
            color: C.espresso900, lineHeight: 1.15, marginTop: 4,
          }}>Strength &amp; Hypertrophy</div>
        </div>
        <div style={{
          padding: '5px 10px', borderRadius: 'var(--r-pill)',
          background: C.sand200,
          fontFamily: '"JetBrains Mono", monospace', fontSize: 9,
          letterSpacing: '1.3px', textTransform: 'uppercase', color: C.walnut,
        }}>TUE</div>
      </div>

      {/* Detail rows */}
      <div style={{ padding: '16px 18px', display: 'flex', flexDirection: 'column', gap: 13 }}>

        {/* Date / time */}
        <MonoRow
          icon={
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.clay500} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="3"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8"  y1="2" x2="8"  y2="6"/>
              <line x1="3"  y1="10" x2="21" y2="10"/>
            </svg>
          }
          primary="TUE · 29 APR 2026 · 07:00 AM"
        />

        {/* Coach row — avatar circle */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ width: 20, flexShrink: 0, display: 'flex', justifyContent: 'center' }}>
            <div style={{
              width: 20, height: 20, borderRadius: '50%',
              background: coachBg, color: C.paper,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: '"Instrument Serif", Georgia, serif',
              fontStyle: 'italic', fontSize: 7.5, flexShrink: 0,
              transition: 'background .3s',
            }}>{coachInitials}</div>
          </div>
          <div style={{
            fontFamily: '"Inter", system-ui', fontSize: 13.5,
            fontWeight: 500, color: dimmed ? C.clay600 : C.espresso900,
            transition: 'color .3s',
          }}>Coach {coachName} · Hypertrophy &amp; Strength</div>
        </div>

        {/* Studio */}
        <MonoRow
          icon={
            <svg width="14" height="16" viewBox="0 0 24 24" fill="none" stroke={C.clay500} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
              <circle cx="12" cy="9" r="2.5"/>
            </svg>
          }
          primary="60 MIN · GROUND FLOOR STUDIO"
          secondary="INDIRANAGAR, BENGALURU"
        />
      </div>
    </div>
  );
}

// ── Main profile screen ───────────────────────────────────────────────────
function ProfileScreen() {
  const [bannerState, setBannerState] = React.useState('pending');

  // Session card reflects coach swap after accept
  const coach = bannerState === 'accepted'
    ? { name: 'Meera', initials: 'ME', bg: C.terra }
    : { name: 'Lee',   initials: 'LE', bg: C.sage };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Dark espresso header */}
      <ProfileHeader />

      {/* Scrollable body */}
      <div style={{
        flex: 1, overflowY: 'auto', overflowX: 'hidden',
        background: C.sand50,
        padding: '14px 14px 0',
        display: 'flex', flexDirection: 'column', gap: 13,
        // hide scrollbar
        scrollbarWidth: 'none',
      }}>
        {/* Banner — injected between header and session card */}
        <ActionBanner
          state={bannerState}
          onAccept={() => setBannerState('accepted')}
          onDecline={() => setBannerState('declined')}
        />

        {/* Your Next Session card */}
        <NextSessionCard
          coachName={coach.name}
          coachInitials={coach.initials}
          coachBg={coach.bg}
          dimmed={bannerState === 'declined'}
        />

        {/* Home indicator */}
        <div style={{ display: 'flex', justifyContent: 'center', padding: '14px 0 10px', flexShrink: 0 }}>
          <div style={{
            width: 134, height: 5, borderRadius: 3,
            background: 'rgba(28,20,14,0.18)',
          }} />
        </div>
      </div>
    </div>
  );
}

// ── Phone frame ───────────────────────────────────────────────────────────
function PhoneFrame({ children }) {
  return (
    <div style={{
      width: 390, height: 844,
      background: '#141010',
      borderRadius: 54,
      position: 'relative',
      boxShadow: [
        '0 0 0 1.5px rgba(255,255,255,0.10)',
        '0 0 0 3px rgba(0,0,0,0.55)',
        '0 60px 120px -30px rgba(14,8,4,0.68)',
        '0 24px 60px -20px rgba(14,8,4,0.42)',
      ].join(', '),
    }}>
      {/* Dynamic Island */}
      <div style={{
        position: 'absolute', top: 13, left: '50%', transform: 'translateX(-50%)',
        width: 124, height: 36, background: '#141010', borderRadius: 20, zIndex: 30,
      }} />

      {/* Screen glass */}
      <div style={{
        position: 'absolute', inset: 3, borderRadius: 50, overflow: 'hidden',
        display: 'flex', flexDirection: 'column',
        background: C.espresso900,
      }}>
        <StatusBar />
        {/* Space so content clears the Dynamic Island */}
        <div style={{ height: 14, flexShrink: 0, background: C.espresso900 }} />
        {children}
      </div>
    </div>
  );
}

// ── Tweaks panel ──────────────────────────────────────────────────────────
// Lets reviewer jump between states without clicking CTAs
function TweaksPanel({ state, setState, onClose }) {
  const opt = (label, val) => {
    const active = state === val;
    return (
      <button key={val} onClick={() => setState(val)} style={{
        flex: 1, padding: '9px 6px', borderRadius: 8,
        border: `1.5px solid ${active ? C.walnut : C.hairStr}`,
        background: active ? C.walnut : C.paper,
        color: active ? C.paper : C.espresso900,
        fontFamily: '"Inter", system-ui', fontSize: 12, fontWeight: 500,
        cursor: 'pointer', transition: 'all .15s',
      }}>{label}</button>
    );
  };

  return (
    <div style={{
      position: 'fixed', bottom: 28, right: 28,
      width: 256, background: C.paper,
      borderRadius: 20,
      boxShadow: '0 20px 50px -20px rgba(62,44,28,0.4), 0 6px 20px -8px rgba(62,44,28,0.18)',
      border: `1px solid ${C.hairStr}`,
      padding: '18px 18px 20px', zIndex: 200,
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
        <span style={{
          fontFamily: '"JetBrains Mono", monospace', fontSize: 11,
          letterSpacing: '1.5px', textTransform: 'uppercase',
          color: C.espresso900, fontWeight: 600,
        }}>Tweaks</span>
        <button onClick={onClose} style={{
          background: 'none', border: 'none', cursor: 'pointer',
          color: C.clay600, fontSize: 20, lineHeight: 1, padding: 2,
        }}>×</button>
      </div>

      <div style={{
        fontFamily: '"JetBrains Mono", monospace', fontSize: 10,
        letterSpacing: '1.4px', textTransform: 'uppercase', color: C.clay600,
        marginBottom: 8,
      }}>Banner state</div>
      <div style={{ display: 'flex', gap: 6 }}>
        {opt('Pending',  'pending')}
        {opt('Accepted', 'accepted')}
        {opt('Declined', 'declined')}
      </div>
    </div>
  );
}

// ── App root ──────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "bannerState": "pending"
}/*EDITMODE-END*/;

function App() {
  const [bannerPreview, setBannerPreview] = React.useState(TWEAK_DEFAULTS.bannerState);
  const [showTweaks, setShowTweaks] = React.useState(false);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const closeTweaks = () => {
    setShowTweaks(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const setPreviewState = (val) => {
    setBannerPreview(val);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { bannerState: val } }, '*');
  };

  return (
    <>
      <div className="stage">
        <PhoneFrame>
          <ProfileScreenControlled initialState={bannerPreview} key={bannerPreview} />
        </PhoneFrame>
      </div>

      {showTweaks && (
        <TweaksPanel
          state={bannerPreview}
          setState={setPreviewState}
          onClose={closeTweaks}
        />
      )}
    </>
  );
}

// Controlled variant so Tweaks can reset state
function ProfileScreenControlled({ initialState }) {
  const [bannerState, setBannerState] = React.useState(initialState);

  const coach = bannerState === 'accepted'
    ? { name: 'Meera', initials: 'ME', bg: C.terra }
    : { name: 'Lee',   initials: 'LE', bg: C.sage  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <ProfileHeader />
      <div style={{
        flex: 1, overflowY: 'auto', overflowX: 'hidden',
        background: C.sand50, padding: '14px 14px 0',
        display: 'flex', flexDirection: 'column', gap: 13,
        scrollbarWidth: 'none',
      }}>
        <ActionBanner
          state={bannerState}
          onAccept={()  => setBannerState('accepted')}
          onDecline={() => setBannerState('declined')}
        />
        <NextSessionCard
          coachName={coach.name}
          coachInitials={coach.initials}
          coachBg={coach.bg}
          dimmed={bannerState === 'declined'}
        />
        <div style={{ display: 'flex', justifyContent: 'center', padding: '14px 0 10px' }}>
          <div style={{ width: 134, height: 5, borderRadius: 3, background: 'rgba(28,20,14,0.18)' }} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
