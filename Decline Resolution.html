<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Decline Resolution · My Third Space Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: var(--sand-50);
    font-family: var(--f-body);
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    min-height: 100vh;
    padding: 56px 40px 96px;
    background-color: var(--sand-50);
    background-image:
      linear-gradient(var(--hairline) 1px, transparent 1px),
      linear-gradient(90deg, var(--hairline) 1px, transparent 1px);
    background-size: 40px 40px;
    background-position: -1px -1px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }

  .section-head {
    width: 100%;
    max-width: 1320px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .section-head .label {
    font-family: var(--f-mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--clay-600);
    white-space: nowrap;
  }
  .section-head .rule { flex: 1; height: 1px; background: var(--hairline-strong); }

  .preamble {
    width: 100%;
    max-width: 1320px;
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 56px;
    align-items: end;
  }
  .preamble h1 {
    font-family: var(--f-display);
    font-style: italic;
    font-weight: 400;
    font-size: 56px;
    line-height: 1.04;
    letter-spacing: -1px;
    color: var(--espresso-900);
  }
  .preamble p {
    font-family: var(--f-body);
    font-size: 15px;
    color: var(--espresso-800);
    line-height: 1.6;
    max-width: 44ch;
    text-wrap: pretty;
  }
  .preamble p + p { margin-top: 12px; color: var(--clay-600); }

  .frames-wrap {
    width: 100%;
    max-width: 1320px;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 48px;
    align-items: start;
  }

  .frame-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-up { animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both; }

  @keyframes countTick {
    0%,100% { opacity: 1 }
    50%     { opacity: 0.35 }
  }
  .tick { animation: countTick 1.4s ease-in-out infinite; }

  @media (max-width: 1180px) {
    .frames-wrap { grid-template-columns: 1fr !important; gap: 56px; justify-items: center; }
  }
  @media (max-width: 720px) {
    .stage { padding: 32px 16px 56px; }
    .preamble { grid-template-columns: 1fr !important; gap: 20px !important; align-items: start; }
    .preamble h1 { font-size: 38px !important; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">

// ── Palette (mirrors tokens.css) ──────────────────────────────────────────
const C = {
  espresso900: '#241810',
  espresso800: '#3E2C1C',
  walnut:      '#5E4228',
  clay600:     '#8A6640',
  clay500:     '#A8825A',
  sand50:      '#FBF7F0',
  sand100:     '#F5EDE0',
  sand200:     '#EADBC4',
  sand300:     '#D9C3A3',
  paper:       '#FFFDF8',
  sage:        '#7B8B6F',
  sage200:     '#D7DECF',
  terra:       '#B86B4B',
  terra200:    '#ECCDBF',
  ochre:       '#C99A3F',
  hair:        'rgba(62,44,28,0.12)',
  hairStr:     'rgba(62,44,28,0.22)',
};

// ── Data ──────────────────────────────────────────────────────────────────
const CLIENT = { name: 'Riya Sharma', initials: 'RS', tenure: 'Member · 3 yrs', tag: '32 · F · Muscle Gain' };
const DECLINING_COACH = {
  name: 'Joe Mehta', first: 'Joe', initials: 'JO', bg: C.walnut,
  specialty: 'Hypertrophy · Strength',
  reason: 'Pre-existing PT runs to 6:45 — no buffer to reset for a 7 AM.',
  submittedAt: 'Today, 9:14 AM',
};
const SLOT = { day: 'TUE', date: '29 APR 2026', time: '07:00 AM', duration: '60 MIN', room: 'Ground floor studio' };
const SLA = { deadline: 'RESOLVE BY 8:00 PM TONIGHT', remaining: '3H 22M LEFT' };

const AVAILABLE = [
  { name: 'Deb Sen',    first: 'Deb',    initials: 'DE', bg: C.terra, specialty: 'Strength & mobility',     window: 'Free 6:00 – 8:30 AM', load: '14 PT this week · 2 left',  why: 'Worked with Riya twice last month.' },
  { name: 'Anisha Rao', first: 'Anisha', initials: 'AN', bg: C.sage,  specialty: 'Athletic conditioning',   window: 'Free 6:30 – 9:00 AM', load: '11 PT this week · 5 left',  why: 'Specialty overlaps Joe’s plan.' },
];

// ── Small atoms ───────────────────────────────────────────────────────────
function MonoLabel({ children, color, size = 10, dot, dotColor }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: dot ? 7 : 0,
      fontFamily: '"JetBrains Mono",monospace', fontSize: size,
      letterSpacing: '1.8px', textTransform: 'uppercase', color,
    }}>
      {dot && <span style={{ width: 6, height: 6, borderRadius: '50%', background: dotColor || color, flexShrink: 0 }} />}
      {children}
    </span>
  );
}

function Avatar({ initials, bg, size = 36, ring = true }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: bg, color: C.paper, flexShrink: 0,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '"Instrument Serif",serif', fontStyle: 'italic',
      fontSize: size * 0.4,
      boxShadow: ring ? `0 0 0 2px ${C.paper}, 0 0 0 3px ${C.hair}` : 'none',
    }}>{initials}</div>
  );
}

function PillBtn({ children, variant = 'primary', size = 'md', onClick, full }) {
  const [hov, setHov] = React.useState(false);
  const pad = size === 'sm' ? '8px 16px' : '11px 22px';
  const fs = size === 'sm' ? 12.5 : 13.5;
  let style = {};
  if (variant === 'primary') style = {
    background: hov ? C.espresso800 : C.terra,
    color: C.paper, border: 'none',
  };
  else if (variant === 'ghost') style = {
    background: hov ? C.sand100 : 'transparent',
    color: C.espresso900,
    border: `1.25px solid ${hov ? C.walnut : C.hairStr}`,
  };
  return (
    <button onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        padding: pad, borderRadius: 999, fontFamily: '"Inter",system-ui',
        fontSize: fs, fontWeight: variant === 'primary' ? 600 : 500,
        cursor: 'pointer', transition: 'all .18s',
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        width: full ? '100%' : 'auto',
        ...style,
      }}>
      {children}
    </button>
  );
}

// ── Status tag (pill, mono) ───────────────────────────────────────────────
function StatusTag() {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 7,
      padding: '5px 11px 5px 9px', borderRadius: 999,
      background: 'rgba(184,107,75,0.10)',
      border: `1px solid rgba(184,107,75,0.32)`,
      fontFamily: '"JetBrains Mono",monospace', fontSize: 9.5,
      letterSpacing: '1.8px', textTransform: 'uppercase', color: C.terra,
    }}>
      <span className="tick" style={{ width: 6, height: 6, borderRadius: '50%', background: C.terra }} />
      Awaiting resolution
    </span>
  );
}

// ── SECTION 1: Session at Risk Card (desktop) ─────────────────────────────
function SessionAtRiskCard({ compact = false }) {
  return (
    <div className="anim-up" style={{
      background: C.paper,
      borderRadius: 14,
      border: `1px solid ${C.hairStr}`,
      borderLeft: `4px solid ${C.terra}`,
      boxShadow: '0 6px 20px -8px rgba(62,44,28,0.18)',
      overflow: 'hidden',
    }}>
      {/* Top strip: status + SLA */}
      <div style={{
        padding: compact ? '12px 16px' : '14px 24px',
        background: 'linear-gradient(90deg, rgba(184,107,75,0.06) 0%, rgba(184,107,75,0.0) 80%)',
        borderBottom: `1px solid ${C.hair}`,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        gap: 12, flexWrap: 'wrap',
      }}>
        <StatusTag />
        <div style={{
          display: 'inline-flex', alignItems: 'baseline', gap: 10,
          fontFamily: '"JetBrains Mono",monospace',
        }}>
          <span style={{ fontSize: 9.5, letterSpacing: '1.8px', textTransform: 'uppercase', color: C.clay600 }}>
            {SLA.deadline}
          </span>
          <span style={{ width: 1, height: 12, background: C.hairStr, alignSelf: 'center' }} />
          <span style={{ fontSize: 11, letterSpacing: '1.5px', color: C.terra, fontWeight: 500 }}>
            {SLA.remaining}
          </span>
        </div>
      </div>

      {/* Body: split layout */}
      <div style={{
        padding: compact ? '18px 16px 20px' : '26px 28px 28px',
        display: 'grid',
        gridTemplateColumns: compact ? '1fr' : '1.05fr 1px 1fr',
        gap: compact ? 18 : 28,
      }}>
        {/* Left: parties + slot */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <MonoLabel color={C.clay600} dot dotColor={C.terra}>Flagged time slot</MonoLabel>
          <div style={{
            fontFamily: '"JetBrains Mono",monospace', fontSize: compact ? 13 : 15,
            letterSpacing: '0.8px', color: C.espresso900, fontWeight: 500,
          }}>
            {SLOT.day} · {SLOT.date} · {SLOT.time}
          </div>

          {/* Parties row */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap' }}>
            {/* Client */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <Avatar initials={CLIENT.initials} bg={C.walnut} size={compact ? 32 : 40} />
              <div>
                <div style={{ fontFamily: '"Inter",system-ui', fontSize: compact ? 13.5 : 15, fontWeight: 600, color: C.espresso900 }}>
                  {CLIENT.name}
                </div>
                <div style={{ fontFamily: '"JetBrains Mono",monospace', fontSize: 9, letterSpacing: '1.4px', textTransform: 'uppercase', color: C.clay600, marginTop: 2 }}>
                  Member · 3 yrs
                </div>
              </div>
            </div>

            {/* Conflict glyph */}
            <div style={{
              fontFamily: '"JetBrains Mono",monospace', fontSize: 14,
              color: C.terra, padding: '2px 6px',
            }}>↛</div>

            {/* Coach who declined */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ position: 'relative' }}>
                <Avatar initials={DECLINING_COACH.initials} bg={DECLINING_COACH.bg} size={compact ? 32 : 40} />
                <div style={{
                  position: 'absolute', bottom: -2, right: -2,
                  width: compact ? 14 : 18, height: compact ? 14 : 18, borderRadius: '50%',
                  background: C.terra, color: C.paper,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: compact ? 9 : 11, fontWeight: 700,
                  border: `2px solid ${C.paper}`,
                  fontFamily: '"Inter",system-ui',
                }}>×</div>
              </div>
              <div>
                <div style={{
                  fontFamily: '"Inter",system-ui', fontSize: compact ? 13.5 : 15, fontWeight: 600,
                  color: C.espresso900, textDecoration: 'line-through',
                  textDecorationColor: 'rgba(62,44,28,0.4)', textDecorationThickness: '1px',
                }}>
                  {DECLINING_COACH.name}
                </div>
                <div style={{ fontFamily: '"JetBrains Mono",monospace', fontSize: 9, letterSpacing: '1.4px', textTransform: 'uppercase', color: C.terra, marginTop: 2 }}>
                  Declined · {DECLINING_COACH.submittedAt.replace('Today, ', '')}
                </div>
              </div>
            </div>
          </div>

          {/* meta strip */}
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 10, flexWrap: 'wrap',
            paddingTop: 6, borderTop: `1px solid ${C.hair}`,
          }}>
            <span style={{ fontFamily: '"JetBrains Mono",monospace', fontSize: 9.5, letterSpacing: '1.6px', textTransform: 'uppercase', color: C.clay600 }}>
              {SLOT.duration}
            </span>
            <span style={{ width: 3, height: 3, borderRadius: '50%', background: C.clay500 }} />
            <span style={{ fontFamily: '"JetBrains Mono",monospace', fontSize: 9.5, letterSpacing: '1.6px', textTransform: 'uppercase', color: C.clay600 }}>
              {SLOT.room}
            </span>
            <span style={{ width: 3, height: 3, borderRadius: '50%', background: C.clay500 }} />
            <span style={{ fontFamily: '"JetBrains Mono",monospace', fontSize: 9.5, letterSpacing: '1.6px', textTransform: 'uppercase', color: C.clay600 }}>
              PT package · 11 left
            </span>
          </div>
        </div>

        {/* Divider */}
        {!compact && <div style={{ width: 1, background: C.hair }} />}

        {/* Right: decline reason quote */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12, paddingTop: compact ? 4 : 2 }}>
          <MonoLabel color={C.clay600} dot dotColor={C.walnut}>Stated reason</MonoLabel>
          <blockquote style={{
            fontFamily: '"Instrument Serif",Georgia,serif',
            fontStyle: 'italic', fontWeight: 400,
            fontSize: compact ? 19 : 22, lineHeight: 1.25,
            color: C.espresso900, letterSpacing: '-0.4px',
            textWrap: 'pretty',
          }}>
            “{DECLINING_COACH.reason}”
          </blockquote>
          <div style={{
            fontFamily: '"Inter",system-ui', fontSize: 12.5, color: C.clay600,
            display: 'inline-flex', alignItems: 'center', gap: 8,
          }}>
            <span style={{ width: 18, height: 1, background: C.clay500 }} />
            {DECLINING_COACH.first}, submitted {DECLINING_COACH.submittedAt}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── SECTION 2A: Available Coach Card ──────────────────────────────────────
function CoachCard({ coach, compact }) {
  const [hov, setHov] = React.useState(false);
  return (
    <div
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        background: C.paper,
        borderRadius: 14,
        border: `1px solid ${hov ? C.hairStr : C.hair}`,
        boxShadow: hov ? '0 12px 30px -16px rgba(62,44,28,0.30)' : '0 1px 2px rgba(62,44,28,0.06)',
        padding: compact ? '14px 14px 14px' : '18px 20px 18px',
        display: 'flex', alignItems: 'stretch', gap: compact ? 12 : 16,
        transition: 'all .2s',
        transform: hov ? 'translateY(-1px)' : 'none',
      }}>
      <Avatar initials={coach.initials} bg={coach.bg} size={compact ? 40 : 48} ring={false} />
      <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: compact ? 4 : 6 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 10, flexWrap: 'wrap' }}>
          <div style={{
            fontFamily: '"Inter",system-ui', fontSize: compact ? 14.5 : 16,
            fontWeight: 600, color: C.espresso900,
          }}>
            {coach.name}
          </div>
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 5,
            fontFamily: '"JetBrains Mono",monospace', fontSize: 9,
            letterSpacing: '1.4px', textTransform: 'uppercase', color: C.sage,
          }}>
            <span style={{
              width: 12, height: 12, borderRadius: '50%', background: C.sage,
              color: C.paper, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 8, fontWeight: 700,
            }}>✓</span>
            Available
          </div>
        </div>
        <div style={{ fontFamily: '"Inter",system-ui', fontSize: compact ? 12.5 : 13.5, color: C.espresso800 }}>
          {coach.specialty}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginTop: 2 }}>
          <span style={{ fontFamily: '"JetBrains Mono",monospace', fontSize: 9.5, letterSpacing: '1.4px', textTransform: 'uppercase', color: C.clay600 }}>
            {coach.window}
          </span>
          <span style={{ width: 3, height: 3, borderRadius: '50%', background: C.clay500 }} />
          <span style={{ fontFamily: '"JetBrains Mono",monospace', fontSize: 9.5, letterSpacing: '1.4px', textTransform: 'uppercase', color: C.clay600 }}>
            {coach.load}
          </span>
        </div>
        {!compact && (
          <div style={{
            fontFamily: '"Inter",system-ui', fontSize: 12.5,
            color: C.clay600, fontStyle: 'italic', marginTop: 2,
          }}>
            {coach.why}
          </div>
        )}
        <div style={{ marginTop: compact ? 8 : 12 }}>
          <PillBtn variant="primary" size={compact ? 'sm' : 'md'}>
            Assign to {coach.first}
            <span style={{ transform: hov ? 'translateX(3px)' : 'none', transition: 'transform .2s' }}>→</span>
          </PillBtn>
        </div>
      </div>
    </div>
  );
}

// ── SECTION 2: Resolution Options (desktop two-column) ────────────────────
function ResolutionOptions({ compact = false }) {
  const layout = compact ? '1fr' : '1.45fr 1fr';
  return (
    <div className="anim-up" style={{ animationDelay: '0.08s' }}>
      {/* Section heading */}
      <div style={{ marginBottom: compact ? 18 : 26, display: 'flex', flexDirection: 'column', gap: 8 }}>
        <MonoLabel color={C.clay600} dot dotColor={C.walnut}>Resolution options · choose one path</MonoLabel>
        <h2 style={{
          fontFamily: '"Instrument Serif",Georgia,serif', fontStyle: 'italic',
          fontWeight: 400, fontSize: compact ? 30 : 40, lineHeight: 1.05,
          letterSpacing: '-0.5px', color: C.espresso900, textWrap: 'pretty',
        }}>
          Reassign internally, or send it<br/>back to <em>her.</em>
        </h2>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: layout, gap: compact ? 16 : 28, alignItems: 'start' }}>
        {/* Option A */}
        <section style={{
          background: 'transparent',
          padding: compact ? 0 : '0',
        }}>
          <div style={{
            display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14,
            padding: '6px 12px', background: C.sand100, borderRadius: 999,
            width: 'fit-content',
            border: `1px solid ${C.hair}`,
          }}>
            <span style={{
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              width: 18, height: 18, borderRadius: '50%', background: C.walnut, color: C.paper,
              fontFamily: '"JetBrains Mono",monospace', fontSize: 9.5, fontWeight: 600,
            }}>A</span>
            <span style={{
              fontFamily: '"JetBrains Mono",monospace', fontSize: 10,
              letterSpacing: '1.8px', textTransform: 'uppercase', color: C.espresso800,
            }}>
              Reassign to another coach
            </span>
          </div>
          <h3 style={{
            fontFamily: '"Instrument Serif",Georgia,serif',
            fontStyle: 'italic', fontWeight: 400,
            fontSize: compact ? 22 : 26, color: C.espresso900,
            lineHeight: 1.1, marginBottom: 6,
          }}>
            Available coaches at this time slot.
          </h3>
          <p style={{
            fontFamily: '"Inter",system-ui', fontSize: 13.5, color: C.clay600,
            lineHeight: 1.55, marginBottom: compact ? 14 : 18, maxWidth: '52ch',
          }}>
            Two coaches are free at 7 AM tomorrow. Assigning sends Riya a confirmation in her app and updates the coach calendar instantly.
          </p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {AVAILABLE.map(c => <CoachCard key={c.initials} coach={c} compact={compact} />)}
          </div>
        </section>

        {/* Vertical OR divider — desktop only */}
        {!compact && (
          <section style={{
            position: 'relative',
            paddingLeft: 12,
          }}>
            <div style={{
              position: 'absolute', left: -16, top: 0, bottom: 0,
              width: 1, background: C.hair,
            }}>
              <div style={{
                position: 'absolute', top: 80, left: -14,
                width: 28, height: 28, borderRadius: '50%',
                background: C.sand50, border: `1px solid ${C.hairStr}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: '"JetBrains Mono",monospace', fontSize: 9,
                letterSpacing: '1.5px', color: C.clay600,
              }}>OR</div>
            </div>

            {/* Option B inner */}
            <OptionB compact={false} />
          </section>
        )}

        {compact && (
          <div style={{
            display: 'flex', alignItems: 'center', gap: 10, padding: '12px 0',
          }}>
            <span style={{ flex: 1, height: 1, background: C.hair }} />
            <span style={{
              fontFamily: '"JetBrains Mono",monospace', fontSize: 9,
              letterSpacing: '1.8px', textTransform: 'uppercase', color: C.clay600,
              padding: '4px 12px', background: C.sand50,
              border: `1px solid ${C.hairStr}`, borderRadius: 999,
            }}>OR</span>
            <span style={{ flex: 1, height: 1, background: C.hair }} />
          </div>
        )}
        {compact && <OptionB compact />}
      </div>
    </div>
  );
}

function OptionB({ compact }) {
  return (
    <div style={{
      background: C.sand100,
      border: `1px solid ${C.hair}`,
      borderRadius: 16,
      padding: compact ? '18px 18px 20px' : '22px 24px 26px',
      display: 'flex', flexDirection: 'column', gap: 12,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10,
        padding: '6px 12px', background: C.paper, borderRadius: 999,

function ScaledPhone({ scale, children }) {

    </div>
  );
}

function useScale() {
  const [scale, setScale] = React.useState(0.86);
  React.useEffect(() => {
    const measure = () => {
      const w = window.innerWidth;
      if (w < 460)  setScale(0.78);
      else if (w < 720)  setScale(0.85);
      else if (w < 1180) setScale(0.86);
      else setScale(0.86);
    };
    measure();
    window.addEventListener('resize', measure);
    return () => window.removeEventListener('resize', measure);
  }, []);
  return scale;
}
