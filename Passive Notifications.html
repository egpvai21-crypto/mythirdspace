<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Passive Notifications · My Third Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: var(--sand-50);
    font-family: var(--f-body);
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    min-height: 100vh;
    padding: 56px 40px 80px;
    background-color: var(--sand-50);
    background-image:
      linear-gradient(var(--hairline) 1px, transparent 1px),
      linear-gradient(90deg, var(--hairline) 1px, transparent 1px);
    background-size: 40px 40px;
    background-position: -1px -1px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  .section-head {
    width: 100%;
    max-width: 1060px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .section-head .label {
    font-family: var(--f-mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--clay-600);
    white-space: nowrap;
  }
  .section-head .rule {
    flex: 1;
    height: 1px;
    background: var(--hairline-strong);
  }

  .preamble {
    width: 100%;
    max-width: 1060px;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 56px;
    align-items: end;
  }
  .preamble h1 {
    font-family: var(--f-display);
    font-style: italic;
    font-weight: 400;
    font-size: 52px;
    line-height: 1.04;
    letter-spacing: -1px;
    color: var(--espresso-900);
  }
  .preamble p {
    font-family: var(--f-body);
    font-size: 15px;
    color: var(--espresso-800);
    line-height: 1.6;
    max-width: 38ch;
    text-wrap: pretty;
  }
  .preamble p + p { margin-top: 12px; }

  .frames-row {
    display: flex;
    gap: 48px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  .frame-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  /* Frame entry */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-up { animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both; }

  @media (max-width: 720px) {
    .stage { padding: 32px 16px 56px; }
    .preamble {
      grid-template-columns: 1fr !important;
      gap: 20px !important;
      align-items: start;
    }
    .preamble h1 { font-size: 36px !important; }
    .frames-row { gap: 32px; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">

// ── Palette (mirrors tokens.css) ──────────────────────────────────────────
const C = {

  clay600:     '#8A6640',
  clay500:     '#A8825A',
  sand50:      '#FBF7F0',
  sand100:     '#F5EDE0',
  sand200:     '#EADBC4',
  sand300:     '#D9C3A3',
  paper:       '#FFFDF8',
  sage:        '#7B8B6F',

  ochre:       '#C99A3F',

// ── Phone frame shells ────────────────────────────────────────────────────
function PhoneFrame({ children }) {
  return (

function ScaledPhone({ scale, children }) {
  return (
    <div style={{ width: 390 * scale, height: 844 * scale, flexShrink: 0 }}>
      <div style={{
        transform: `scale(${scale})`, transformOrigin: 'top left',
        width: 390, height: 844,
      }}>
        {children}
      </div>
    </div>
  );
}

// Responsive scale: shrinks the phones on narrower viewports
function useScale() {
  const [scale, setScale] = React.useState(0.86);
  React.useEffect(() => {
    const measure = () => {
      const w = window.innerWidth;
      if (w < 460)  setScale(0.72);
      else if (w < 720)  setScale(0.82);
      else if (w < 1000) setScale(0.78);
      else setScale(0.86);
    };
    measure();
    window.addEventListener('resize', measure);
    return () => window.removeEventListener('resize', measure);
  }, []);
  return scale;
}

      }}>{num}</div>
      <div style={{
        fontFamily: '"Instrument Serif",Georgia,serif', fontStyle: 'italic',
        fontSize: 22, color: C.espresso900, lineHeight: 1.1, marginBottom: 8,
      }}>{title}</div>
      <div style={{
        fontFamily: '"Inter",system-ui', fontSize: 13, color: C.clay600,
        lineHeight: 1.55, textWrap: 'pretty',
      }}>{sub}</div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────
function App() {
  const scale = useScale();
  return (

        <h1>When nothing was<br/>asked of <em>you</em>.</h1>

          <p style={{ color: 'var(--clay-600)' }}>One pulls a substitute coach in automatically. The other finds no one free and quietly returns the credit. Both read as a coach updating you across the counter, not a notification pinging for attention.</p>

      <div className="frames-row">

</script>
