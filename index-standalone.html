<style>
  html { scroll-behavior: smooth; }
  ::selection { background: var(--walnut-700); color: var(--paper); }
  body { overflow-x: clip; }

  /* Bottom-nav padding for mobile so content isn't hidden behind it */
  @media (max-width: 959px) {
    body { padding-bottom: 78px; }
  }

  /* Sign-in modal */
  .signin-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(62, 44, 28, 0.42);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: signinFade 0.18s ease;
  }
  @keyframes signinFade { from { opacity: 0; } to { opacity: 1; } }
  .signin-card {
    background: var(--paper);
    border-radius: var(--r-lg);
    box-shadow: var(--sh-3);
    width: 100%; max-width: 420px;
    padding: 36px 32px 28px;
    font-family: var(--f-body);
    position: relative;
  }
  .signin-close {
    position: absolute; top: 14px; right: 14px;
    width: 32px; height: 32px; border-radius: 50%;
    border: none; background: var(--sand-100); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--clay-600);
  }
  .signin-card h2 { margin: 0; font-family: var(--f-display); font-size: 32px; font-weight: 400; color: var(--espresso-900); line-height: 1.1; }
  .signin-card .lead { margin: 8px 0 24px; font-size: 14px; color: var(--clay-600); }
  .signin-card label { font-family: var(--f-mono); font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase; color: var(--clay-600); display: block; margin-bottom: 6px; }
  .signin-card input {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--hairline-strong); border-radius: 10px;
    font-family: var(--f-body); font-size: 15px;
    background: var(--paper); color: var(--espresso-900);
    box-sizing: border-box;
  }
  .signin-card input:focus { outline: 2px solid var(--walnut-700); outline-offset: -1px; border-color: var(--walnut-700); }
  .signin-cta {
    width: 100%; margin-top: 20px;
    padding: 13px; border-radius: var(--r-pill);
    border: none; background: var(--walnut-700); color: var(--paper);
    font-family: var(--f-body); font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  .signin-divider { text-align: center; margin: 18px 0 14px; position: relative; }
  .signin-divider::before { content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: var(--hairline); }
  .signin-divider span { background: var(--paper); padding: 0 12px; position: relative; font-family: var(--f-mono); font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase; color: var(--clay-600); }
  .signin-google {
    width: 100%; padding: 12px;
    border: 1px solid var(--hairline-strong); border-radius: var(--r-pill);
    background: var(--paper); cursor: pointer;
    font-family: var(--f-body); font-size: 14px; font-weight: 500; color: var(--espresso-900);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .signin-foot { margin-top: 18px; font-size: 12.5px; color: var(--clay-600); text-align: center; }
  .signin-foot a { color: var(--walnut-700); cursor: pointer; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; right: 20px; bottom: 20px; z-index: 1000;
    background: var(--paper); border: 1px solid var(--hairline-strong);
    border-radius: var(--r-lg); box-shadow: var(--sh-3);
    padding: 20px; width: 280px; font-family: var(--f-body);
    display: none;
  }
  .tweaks-panel.active { display: block; }
  .tweaks-panel h4 { margin: 0 0 14px; font-family: var(--f-display); font-size: 22px; font-weight: 400; color: var(--walnut-700); }
  .tweaks-panel label { font-family: var(--f-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--clay-600); display: block; margin-bottom: 8px; margin-top: 14px; }
  .tweaks-panel .row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweaks-panel button {
    padding: 8px 12px; border-radius: var(--r-pill); border: 1px solid var(--hairline);
    background: var(--sand-50); cursor: pointer; font-size: 12px; font-family: var(--f-body);
  }
  .tweaks-panel button.on { background: var(--walnut-700); color: var(--paper); border-color: var(--walnut-700); }
  .swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
  .swatch.on { border-color: var(--espresso-900); transform: scale(1.1); }
</style>
</head>
<body>
<div id="root"></div>

<div class="tweaks-panel" id="tweaks">
  <h4>Tweaks</h4>

  <label>Primary tone</label>
  <div class="row" id="tw-tone"></div>

  <label>Display font</label>
  <div class="row" id="tw-font"></div>

  <label>Hero copy</label>
  <div class="row" id="tw-hero"></div>

  <label>Booking start</label>
  <div class="row" id="tw-book"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="placeholders.js"></script>
<script src="data.js?v=16"></script>

<script type="text/babel" data-presets="react" src="ui-standalone-bundle.jsx"></script>
<script type="text/babel" data-presets="react" src="sections-standalone-bundle.jsx"></script>
<script type="text/babel" data-presets="react" src="extras-standalone-bundle.jsx"></script>
<script type="text/babel" data-presets="react" src="booking-standalone-bundle.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryTone": "sage",
  "displayFont": "instrument",
  "heroVariant": "third-space",
  "bookingMode": "trainer"
}/*EDITMODE-END*/;

// — Auth helpers (localStorage-backed) ——————————————————————
const AUTH_KEY = "m3s.user";
function loadUser() {
  try { const raw = localStorage.getItem(AUTH_KEY); return raw ? JSON.parse(raw) : null; }
  catch { return null; }
}
function saveUser(u) { localStorage.setItem(AUTH_KEY, JSON.stringify(u)); }
function clearUser() { localStorage.removeItem(AUTH_KEY); }

function SignInModal({ open, onClose, onSignIn }) {
  const [phone, setPhone] = React.useState("");
  if (!open) return null;
  const submit = (e) => { e.preventDefault(); if (!phone.trim()) return; onSignIn({ name: "Member", phone: phone.trim() }); };
  return (
    <div className="signin-overlay" onClick={onClose}>
      <div className="signin-card" onClick={e => e.stopPropagation()}>
        <button className="signin-close" onClick={onClose} aria-label="Close">×</button>
        <h2>Welcome back.</h2>
        <p className="lead">Sign in to continue your practice.</p>
        <form onSubmit={submit}>
          <label>Phone or email</label>
          <input autoFocus value={phone} onChange={e => setPhone(e.target.value)} placeholder="+91 98XXX XXXXX" />
          <button type="submit" className="signin-cta">Continue →</button>
        </form>
        <div className="signin-divider"><span>or</span></div>
        <button className="signin-google" onClick={() => onSignIn({ name: "Aanya Member", email: "aanya@gmail.com" })}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0012 23z"/><path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.07H2.18A11 11 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.83z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.83C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
          Continue with Google
        </button>
        <div className="signin-foot">
          New here? <a onClick={() => { onClose(); window.location.href = "onboarding.html"; }}>Get started →</a>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [active, setActive] = React.useState("home");
  const [user, setUser] = React.useState(loadUser);
  const [signInOpen, setSignInOpen] = React.useState(false);

  // Pick up onboarding completion (?signed_up=1) and adopt the user it stashed.
  React.useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    if (params.get("signed_up") === "1") {
      const fresh = loadUser();
      if (fresh) setUser(fresh);
      // Clean URL
      window.history.replaceState({}, "", window.location.pathname);
    }
  }, []);

  const handleSignIn = (u) => { saveUser(u); setUser(u); setSignInOpen(false); };
  const handleSignOut = () => { clearUser(); setUser(null); };
  const handleMyProfile = () => { window.location.href = "profile.html"; };

  // Track active section via scroll
  React.useEffect(() => {
    const ids = ["home", "about", "founder", "services", "trainers", "book", "kenko", "social"];
    const onScroll = () => {
      const top = window.scrollY + 140;
      for (let i = ids.length - 1; i >= 0; i--) {
        const el = document.getElementById(ids[i]);
        if (el && el.offsetTop <= top) { setActive(ids[i]); return; }
      }
    };
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  // Apply tweaks live
  React.useEffect(() => {
    const root = document.documentElement;
    const tones = {
      walnut: { p: "#5E4228", h: "#3E2C1C" },
      terra:  { p: "#B86B4B", h: "#7a3f26" },
      sage:   { p: "#7B8B6F", h: "#4a5a41" },
      clay:   { p: "#A8825A", h: "#5E4228" },
    };
    const t = tones[tweaks.primaryTone] || tones.walnut;
    root.style.setProperty("--walnut-700", t.p);
    root.style.setProperty("--espresso-800", t.h);

    const fonts = {
      instrument: '"Instrument Serif", Georgia, serif',
      playfair:   '"Playfair Display", Georgia, serif',
      cormorant:  '"Cormorant Garamond", Georgia, serif',
    };
    root.style.setProperty("--f-display", fonts[tweaks.displayFont] || fonts.instrument);
  }, [tweaks]);

  // Tweaks host protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") document.getElementById("tweaks").classList.add("active");
      if (e.data.type === "__deactivate_edit_mode") document.getElementById("tweaks").classList.remove("active");
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const pushTweak = (key, value) => {
    const next = { ...tweaks, [key]: value };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: value } }, "*");
  };

  // Build tweaks UI
  React.useEffect(() => {
    const toneRow = document.getElementById("tw-tone");
    toneRow.innerHTML = "";
    [["walnut", "#5E4228"], ["terra", "#B86B4B"], ["sage", "#7B8B6F"], ["clay", "#A8825A"]].forEach(([k, c]) => {
      const b = document.createElement("button");
      b.className = "swatch" + (tweaks.primaryTone === k ? " on" : "");
      b.style.background = c; b.onclick = () => pushTweak("primaryTone", k);
      toneRow.appendChild(b);
    });
    const fontRow = document.getElementById("tw-font");
    fontRow.innerHTML = "";
    [["instrument", "Instrument"], ["playfair", "Playfair"], ["cormorant", "Cormorant"]].forEach(([k, l]) => {
      const b = document.createElement("button");
      b.textContent = l;
      b.className = tweaks.displayFont === k ? "on" : "";
      b.onclick = () => pushTweak("displayFont", k);
      fontRow.appendChild(b);
    });
    const heroRow = document.getElementById("tw-hero");
    heroRow.innerHTML = "";
    [["third-space", "Third Space"], ["future-self", "Future Self"], ["welcome", "Welcome Back"]].forEach(([k, l]) => {
      const b = document.createElement("button");
      b.textContent = l;
      b.className = tweaks.heroVariant === k ? "on" : "";
      b.onclick = () => pushTweak("heroVariant", k);
      heroRow.appendChild(b);
    });
    const bookRow = document.getElementById("tw-book");
    bookRow.innerHTML = "";
    [["time", "By Time"], ["trainer", "By Trainer"]].forEach(([k, l]) => {
      const b = document.createElement("button");
      b.textContent = l;
      b.className = tweaks.bookingMode === k ? "on" : "";
      b.onclick = () => pushTweak("bookingMode", k);
      bookRow.appendChild(b);
    });
  }, [tweaks]);

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: "smooth" });
  };

  return (
    <>
      <Nav
        active={active}
        onNav={scrollTo}
        onBook={() => scrollTo("book")}
        user={user}
        onSignIn={() => setSignInOpen(true)}
        onSignOut={handleSignOut}
        onMyProfile={handleMyProfile}
      />
      <Hero
        variant={tweaks.heroVariant}
        isLoggedIn={!!user}
        onExplore={() => scrollTo("about")}
        onBook={() => scrollTo("book")}
        onGetStarted={() => { window.location.href = "onboarding.html"; }}
      />
      <AboutM3S />
      <Founder />
      <Services onBook={() => scrollTo("book")} />
      <TrainersSection />
      <Booking initialMode={tweaks.bookingMode} user={user} onSignIn={handleSignIn} />
      <KenkoSection user={user} />
      <SocialSection />
      <Testimonials />
      <Footer />

      <SignInModal open={signInOpen} onClose={() => setSignInOpen(false)} onSignIn={handleSignIn} />

      {/* Link to design system */}
      <div style={{
        position: "fixed", left: 20, bottom: 20, zIndex: 999,
        background: "var(--paper)", border: "1px solid var(--hairline-strong)",
        borderRadius: "var(--r-pill)", padding: "10px 16px", boxShadow: "var(--sh-2)",
        fontFamily: "var(--f-mono)", fontSize: 11, letterSpacing: 1.5,
      }}>
        <a href="design-system.html" style={{ color: "var(--walnut-700)", textDecoration: "none", textTransform: "uppercase" }}>
          → Design System
        </a>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<template id="__bundler_thumbnail" data-bg-color="#3E2C1C">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#3E2C1C"/>
    <!-- Three circles: home, work, third -->
    <circle cx="450" cy="400" r="130" fill="none" stroke="#FFFDF8" stroke-width="3" opacity="0.65"/>
    <circle cx="750" cy="400" r="130" fill="none" stroke="#FFFDF8" stroke-width="3" opacity="0.65"/>
    <circle cx="600" cy="400" r="130" fill="#C99A3F" opacity="0.85"/>
    <text x="600" y="618" text-anchor="middle" fill="#FFFDF8" font-family="Georgia, serif" font-style="italic" font-size="40" letter-spacing="2">my third space</text>
  </svg>
</template>
</body>
</html>
