<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Booking Confirmed · My Third Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--sand-50);
  font-family: var(--f-body);
  -webkit-font-smoothing: antialiased;
}

/* Grid paper stage — same as workspace in coach-universe */
.stage {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  background-color: var(--sand-50);
  background-image:
    linear-gradient(var(--hairline) 1px, transparent 1px),
    linear-gradient(90deg, var(--hairline) 1px, transparent 1px);
  background-size: 40px 40px;
  background-position: -1px -1px;
}

/* Entry animations */
@keyframes iconPop {
  0%   { transform: scale(0.3); opacity: 0; }
  70%  { transform: scale(1.08); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes fadeUp {
  from { transform: translateY(14px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.anim-icon     { animation: iconPop  0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.12s both; }
.anim-headline { animation: fadeUp   0.45s cubic-bezier(0.22, 1, 0.36, 1)    0.32s both; }
.anim-sub      { animation: fadeUp   0.4s  cubic-bezier(0.22, 1, 0.36, 1)    0.44s both; }
.anim-card     { animation: fadeUp   0.5s  cubic-bezier(0.22, 1, 0.36, 1)    0.56s both; }
.anim-btns     { animation: fadeUp   0.4s  cubic-bezier(0.22, 1, 0.36, 1)    0.70s both; }
.anim-fine     { animation: fadeUp   0.4s  cubic-bezier(0.22, 1, 0.36, 1)    0.82s both; }

/* Touch-response on buttons */
.btn-press:active { transform: scale(0.97) !important; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">

// ─── Static sample data (prototype) ──────────────────────────────────────
const COACHES = {
  deb:   { name: "Deb",   role: "Strength & Recovery",  specialty: "Strength",    initials: "DB", bg: "#5E4228" },
  rahul: { name: "Rahul", role: "Strength & Hyrox Prep", specialty: "Hyrox Prep", initials: "RA", bg: "#5E4228" },
  lee:   { name: "Lee",   role: "Hypertrophy & Strength", specialty: "Hypertrophy", initials: "LE", bg: "#7B8B6F" },
};

const TIMES = {
  morning:   { display: "07:00 AM", label: "THU", date: "22 MAY 2026", see: "Thursday morning" },
  afternoon: { display: "01:30 PM", label: "THU", date: "22 MAY 2026", see: "Thursday afternoon" },
  evening:   { display: "06:30 PM", label: "THU", date: "22 MAY 2026", see: "Thursday evening" },
};

const STUDIOS = {
  ground: "Ground Floor Studio",
  upper:  "Upper Training Floor",
};

// ─── Tweaks (defaults) ───────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "coach": "rahul",
  "timeSlot": "evening",
  "studio": "ground"
}/*EDITMODE-END*/;

// ─── Status bar ──────────────────────────────────────────────────────────
function StatusBar() {
  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "14px 26px 0",
      fontFamily: "-apple-system, 'SF Pro Text', system-ui",
      fontSize: 15, fontWeight: 600, color: "#1C140E",
    }}>
      <span style={{ letterSpacing: "-0.2px" }}>9:41</span>
      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        {/* Signal */}
        <svg width="18" height="12" viewBox="0 0 18 12" fill="#1C140E">
          <rect x="0"   y="7"   width="3" height="5"  rx="0.8"/>
          <rect x="4.5" y="4.5" width="3" height="7.5" rx="0.8"/>
          <rect x="9"   y="2"   width="3" height="10" rx="0.8"/>
          <rect x="13.5" y="0"  width="3" height="12" rx="0.8"/>
        </svg>
        {/* WiFi */}
        <svg width="16" height="12" viewBox="0 0 16 12">
          <path fill="#1C140E" d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm0-3.3c1.4 0 2.7.6 3.6 1.5l1.1-1.1A6.8 6.8 0 0 0 8 4.5a6.8 6.8 0 0 0-4.7 2.1l1.1 1.1C5.3 6.8 6.6 6.2 8 6.2zm0-3.3c2.3 0 4.3.9 5.8 2.4l1.1-1.2A8.5 8.5 0 0 0 8 1.2 8.5 8.5 0 0 0 1.1 4.1l1.1 1.2C3.7 3.8 5.7 2.9 8 2.9z"/>
        </svg>
        {/* Battery */}
        <svg width="26" height="13" viewBox="0 0 26 13">
          <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#1C140E" strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="18.5" height="9" rx="2" fill="#1C140E"/>
          <path d="M24 4.5v4c.9-.3 1.5-1.1 1.5-2s-.6-1.7-1.5-2z" fill="#1C140E" fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─── Success icon — brand palette, not generic green ─────────────────────
function SuccessIcon() {
  return (
    <div className="anim-icon" style={{ position: "relative", width: 92, height: 92, display: "flex", alignItems: "center", justifyContent: "center" }}>
      {/* Terracotta halo — warm, brand */}
      <div style={{
        position: "absolute", inset: 0, borderRadius: "50%",
        background: "radial-gradient(circle, #ECCDBF 0%, rgba(236,205,191,0) 72%)",
      }} />
      {/* Soft outer ring */}
      <div style={{
        position: "absolute",
        width: 72, height: 72, borderRadius: "50%",
        border: "1.5px solid rgba(184,107,75,0.2)",
        background: "rgba(236,205,191,0.35)",
      }} />
      {/* Primary circle — walnut-700 */}
      <div style={{
        position: "relative",
        width: 54, height: 54, borderRadius: "50%",
        background: "var(--walnut-700)",
        display: "flex", alignItems: "center", justifyContent: "center",
        boxShadow: "0 8px 28px -6px rgba(94,66,40,0.5), 0 2px 8px rgba(94,66,40,0.18)",
      }}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="var(--paper)" strokeWidth="2.75"
          strokeLinecap="round" strokeLinejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
    </div>
  );
}

// ─── Coach avatar ─────────────────────────────────────────────────────────
function Avatar({ initials, bg, size = 46 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: bg,
      color: "var(--paper)", display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "var(--f-display)", fontSize: Math.round(size * 0.37),
      flexShrink: 0, letterSpacing: "0.5px",
    }}>
      {initials}
    </div>
  );
}

// ─── Session summary card ─────────────────────────────────────────────────
function SessionCard({ coach, time, studio }) {
  const monoRow = {
    display: "flex", alignItems: "flex-start", gap: 13,
  };
  const monoText = {
    fontFamily: "var(--f-mono)", fontSize: 13, letterSpacing: "1.1px",
    color: "var(--espresso-900)", fontWeight: 500, lineHeight: 1.4,
  };
  const iconWrap = {
    width: 30, flexShrink: 0, display: "flex", justifyContent: "center", paddingTop: 1,
  };

  return (
    <div className="anim-card" style={{
      background: "var(--paper)",
      border: "1px solid var(--hairline-strong)",
      borderRadius: "var(--r-xl)",
      boxShadow: "var(--sh-2)",
      overflow: "hidden",
    }}>
      {/* Coach row */}
      <div style={{
        padding: "16px 18px",
        display: "flex", alignItems: "center", gap: 13,
        background: "var(--sand-50)",
        borderBottom: "1px solid var(--hairline)",
      }}>
        <Avatar initials={coach.initials} bg={coach.bg} size={46} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{
            fontFamily: "var(--f-body)", fontSize: 15, fontWeight: 600,
            color: "var(--espresso-900)", lineHeight: 1.2,
          }}>{coach.name}</div>
          <div style={{
            fontFamily: "var(--f-body)", fontSize: 12, color: "var(--clay-600)",
            marginTop: 3, lineHeight: 1.2,
          }}>{coach.role}</div>
        </div>
        {/* Specialty chip */}
        <div style={{
          flexShrink: 0,
          padding: "5px 11px", borderRadius: "var(--r-pill)",
          border: "1px solid var(--hairline-strong)",
          fontFamily: "var(--f-mono)", fontSize: 10, letterSpacing: "1.3px",
          textTransform: "uppercase", color: "var(--walnut-700)",
          background: "var(--paper)", whiteSpace: "nowrap",
        }}>
          {coach.specialty}
        </div>
      </div>

      {/* Detail rows */}
      <div style={{ padding: "18px 18px 20px", display: "flex", flexDirection: "column", gap: 14 }}>
        {/* Date + time */}
        <div style={monoRow}>
          <div style={iconWrap}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--clay-500)" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="3"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8"  y1="2" x2="8"  y2="6"/>
              <line x1="3"  y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <div>
            <div style={monoText}>{time.label} · {time.date}</div>
            <div style={{ ...monoText, color: "var(--walnut-700)", marginTop: 3 }}>{time.display}</div>
          </div>
        </div>

        {/* Duration */}
        <div style={monoRow}>
          <div style={iconWrap}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--clay-500)" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="9"/>
              <polyline points="12 7 12 12 15.5 14"/>
            </svg>
          </div>
          <div style={monoText}>60 MIN · PT SESSION</div>
        </div>

        {/* Studio */}
        <div style={monoRow}>
          <div style={iconWrap}>
            <svg width="15" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--clay-500)" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
              <circle cx="12" cy="9" r="2.5"/>
            </svg>
          </div>
          <div>
            <div style={monoText}>{studio}</div>
            <div style={{ ...monoText, fontSize: 11, color: "var(--clay-600)", letterSpacing: "0.8px", marginTop: 3 }}>
              INDIRANAGAR, BENGALURU
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Main confirmation screen ─────────────────────────────────────────────
function ConfirmationScreen({ tweaks }) {
  const coach  = COACHES[tweaks.coach]  || COACHES.deb;
  const time   = TIMES[tweaks.timeSlot] || TIMES.morning;
  const studio = STUDIOS[tweaks.studio] || STUDIOS.ground;

  return (
    <div style={{
      flex: 1, background: "var(--sand-50)",
      display: "flex", flexDirection: "column",
      overflowY: "auto", overflowX: "hidden",
    }}>
      {/* Content */}
      <div style={{ flex: 1, padding: "36px 22px 32px", display: "flex", flexDirection: "column", alignItems: "stretch" }}>

        {/* Success icon — centred */}
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 18 }}>
          <SuccessIcon />
        </div>

        {/* Headline */}
        <div className="anim-headline" style={{ textAlign: "center", marginBottom: 7 }}>
          <h1 style={{
            fontFamily: "var(--f-display)", fontStyle: "italic", fontWeight: 400,
            fontSize: 34, lineHeight: 1.06, letterSpacing: "-0.4px",
            color: "var(--espresso-900)",
          }}>You're confirmed.</h1>
        </div>

        {/* Sub-line */}
        <div className="anim-sub" style={{ textAlign: "center", marginBottom: 28 }}>
          <p style={{
            fontFamily: "var(--f-body)", fontSize: 14.5, lineHeight: 1.5,
            color: "var(--clay-600)",
          }}>
            See you {time.see}. {coach.name.split(" ")[0]} is ready.
          </p>
        </div>

        {/* Session card */}
        <div style={{ marginBottom: 22 }}>
          <SessionCard coach={coach} time={time} studio={studio} />
        </div>

        {/* CTAs */}
        <div className="anim-btns" style={{ display: "flex", flexDirection: "column", gap: 11 }}>
          <PrimaryBtn>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.25" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}>
              <rect x="3" y="4" width="18" height="18" rx="2.5"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8"  y1="2" x2="8"  y2="6"/>
              <line x1="3"  y1="10" x2="21" y2="10"/>
            </svg>
            Add to Calendar
          </PrimaryBtn>
          <GhostBtn>View Session Details</GhostBtn>
        </div>

        {/* Fine print */}
        <div className="anim-fine" style={{ marginTop: 22, textAlign: "center" }}>
          <p style={{
            fontFamily: "var(--f-body)", fontSize: 11,
            color: "var(--clay-600)", lineHeight: 1.6, opacity: 0.8,
          }}>
            Sessions can be modified up to 8 PM the night before.
          </p>
        </div>
      </div>

      {/* Home indicator */}
      <div style={{ display: "flex", justifyContent: "center", paddingBottom: 10, paddingTop: 6, flexShrink: 0 }}>
        <div style={{
          width: 134, height: 5, borderRadius: 3,
          background: "rgba(28,20,14,0.22)",
        }} />
      </div>
    </div>
  );
}

// ─── Shared button components ─────────────────────────────────────────────
function PrimaryBtn({ children, onClick }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      className="btn-press"
      style={{
        width: "100%", padding: "15px 20px", borderRadius: "var(--r-pill)",
        border: "none",
        background: hover ? "var(--espresso-800)" : "var(--walnut-700)",
        color: "var(--paper)",
        fontFamily: "var(--f-body)", fontSize: 15, fontWeight: 600,
        cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center", gap: 9,
        transition: "background 0.2s",
      }}>
      {children}
    </button>
  );
}

function GhostBtn({ children, onClick }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      className="btn-press"
      style={{
        width: "100%", padding: "14px 20px", borderRadius: "var(--r-pill)",
        border: "1.5px solid var(--hairline-strong)",
        background: hover ? "var(--sand-100)" : "transparent",
        color: "var(--walnut-700)",
        fontFamily: "var(--f-body)", fontSize: 15, fontWeight: 500,
        cursor: "pointer",
        transition: "background 0.2s",
      }}>
      {children}
    </button>
  );
}

// ─── Phone frame ──────────────────────────────────────────────────────────
function PhoneFrame({ children }) {
  return (
    <div style={{
      width: 390, height: 844,
      background: "#141010",
      borderRadius: 54,
      position: "relative",
      boxShadow: [
        "0 0 0 1.5px rgba(255,255,255,0.1)",
        "0 0 0 3px rgba(0,0,0,0.6)",
        "0 60px 120px -30px rgba(14,8,4,0.7)",
        "0 24px 60px -20px rgba(14,8,4,0.45)",
      ].join(", "),
    }}>
      {/* Dynamic Island */}
      <div style={{
        position: "absolute", top: 13, left: "50%", transform: "translateX(-50%)",
        width: 124, height: 36, background: "#141010", borderRadius: 20, zIndex: 30,
      }} />

      {/* Screen glass */}
      <div style={{
        position: "absolute", inset: 3,
        borderRadius: 50,
        background: "var(--sand-50)",
        overflow: "hidden",
        display: "flex", flexDirection: "column",
      }}>
        <StatusBar />
        {/* Dynamic island space */}
        <div style={{ height: 14, flexShrink: 0 }} />
        {children}
      </div>
    </div>
  );
}

// ─── Tweaks panel ─────────────────────────────────────────────────────────
function TweaksPanel({ tweaks, setTweak, onClose }) {
  const labelStyle = {
    fontFamily: "var(--f-mono)", fontSize: 10, letterSpacing: "1.5px",
    textTransform: "uppercase", color: "var(--clay-600)", marginBottom: 8,
    display: "block",
  };
  const optBtnStyle = (active) => ({
    flex: 1, padding: "9px 6px", borderRadius: "var(--r-md)",
    border: `1.5px solid ${active ? "var(--walnut-700)" : "var(--hairline)"}`,
    background: active ? "var(--walnut-700)" : "var(--paper)",
    color: active ? "var(--paper)" : "var(--espresso-900)",
    fontFamily: "var(--f-body)", fontSize: 12, fontWeight: 500,
    cursor: "pointer", transition: "all .15s",
  });

  return (
    <div style={{
      position: "fixed", bottom: 28, right: 28,
      width: 248, background: "var(--paper)",
      borderRadius: "var(--r-xl)",
      boxShadow: "var(--sh-3)",
      border: "1px solid var(--hairline-strong)",
      padding: "18px 18px 20px",
      zIndex: 200, fontFamily: "var(--f-body)",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
        <span style={{ fontFamily: "var(--f-mono)", fontSize: 11, letterSpacing: "1.5px", textTransform: "uppercase", color: "var(--espresso-900)", fontWeight: 600 }}>Tweaks</span>
        <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--clay-600)", fontSize: 18, lineHeight: 1, padding: 2 }}>×</button>
      </div>

      {/* Coach */}
      <div style={{ marginBottom: 16 }}>
        <span style={labelStyle}>Coach</span>
        <div style={{ display: "flex", gap: 6 }}>
          {Object.entries(COACHES).map(([key, c]) => (
            <button key={key} onClick={() => setTweak("coach", key)} style={optBtnStyle(tweaks.coach === key)}>
              {c.name}
            </button>
          ))}
        </div>
      </div>

      {/* Time */}
      <div style={{ marginBottom: 0 }}>
        <span style={labelStyle}>Time of Day</span>
        <div style={{ display: "flex", gap: 6 }}>
          {Object.entries(TIMES).map(([key]) => (
            <button key={key} onClick={() => setTweak("timeSlot", key)} style={optBtnStyle(tweaks.timeSlot === key)}>
              {key.charAt(0).toUpperCase() + key.slice(1)}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── App root ─────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaksState] = React.useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = React.useState(false);

  const setTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaksState(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: next }, "*");
  };

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode")   setShowTweaks(true);
      if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  const closeTweaks = () => {
    setShowTweaks(false);
    window.parent.postMessage({ type: "__edit_mode_dismissed" }, "*");
  };

  return (
    <>
      <div className="stage">
        <PhoneFrame>
          <ConfirmationScreen tweaks={tweaks} />
        </PhoneFrame>
      </div>

      {showTweaks && (
        <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={closeTweaks} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
